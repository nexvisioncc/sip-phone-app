apiVersion: v1
kind: Secret
metadata:
  name: firebase-service-account
  namespace: sip-phone
type: Opaque
stringData:
  # PLACEHOLDER - Add your firebase-service-account.json here
  # Get it from Firebase Console → Project Settings → Service Accounts
  # This file is gitignored for security
  firebase-service-account.json: |
    {
      "type": "service_account",
      "project_id": "your-project-id",
      "private_key_id": "your-private-key-id",
      "private_key": "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n",
      "client_email": "firebase-adminsdk@your-project.iam.gserviceaccount.com",
      "client_id": "your-client-id",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
  namespace: sip-phone
type: Opaque
stringData:
  database-url: "postgres://sipphone:sipphone@postgres:5432/sipphone"
  redis-url: "redis://redis:6379"
  turn-secret: "nexvision-turn-secret-2024"
