name: sip_phone_app
description: SIP Phone App for Nexvision - Native Android SIP client with Twilio integration

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # SIP & WebRTC
  sip_ua: ^0.6.0
  flutter_webrtc: ^0.10.4
  
  # Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_callkit_incoming: ^2.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Audio
  audio_session: ^0.1.18
  
  # Utils
  uuid: ^4.2.2
  intl: ^0.19.0
  logger: ^2.0.2
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
