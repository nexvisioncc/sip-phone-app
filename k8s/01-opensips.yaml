apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensips
  namespace: sip-phone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensips
  template:
    metadata:
      labels:
        app: opensips
    spec:
      containers:
      - name: opensips
        image: opensips/opensips:3.4
        ports:
        - containerPort: 5060
          protocol: UDP
          name: sip-udp
        - containerPort: 5060
          name: sip-tcp
        - containerPort: 5061
          name: sip-tls
        command:
        - opensips
        - -F
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: opensips
  namespace: sip-phone
spec:
  selector:
    app: opensips
  ports:
  - name: sip-udp
    port: 5060
    protocol: UDP
    nodePort: 30060
  - name: sip-tcp
    port: 5060
    nodePort: 30060
  - name: sip-tls
    port: 5061
    nodePort: 30061
  type: NodePort
